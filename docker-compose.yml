services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://nexus:nexus@db:5432/nexus_db"
      # Для доступа с IP/домена добавьте origin фронта, напр.: "http://192.168.1.5:3000"
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      JWT_SECRET: "nexus-dev-secret-change-in-prod"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_ORIGIN: "http://backend:8000"
    ports:
      - "3000:3000"
    environment:
      BACKEND_ORIGIN: "http://backend:8000"
      INTERNAL_API_URL: "http://backend:8000/api"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    command: ["python", "telegram_bot.py"]
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "mistral"
      NEXUS_API_URL: "http://backend:8000/api"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
