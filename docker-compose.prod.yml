services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://nexus:nexus@db:5432/nexus_db"
      CORS_ORIGINS: '["http://${SERVER_IP:-0.0.0.0}:3000"]'
      JWT_SECRET: "${JWT_SECRET:-nexus-prod-secret-CHANGE-ME}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://${SERVER_IP:-localhost}:8000/api"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://${SERVER_IP:-localhost}:8000/api"
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build: ./backend
    command: ["python", "telegram_bot.py"]
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "mistral"
      NEXUS_API_URL: "http://backend:8000/api"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
